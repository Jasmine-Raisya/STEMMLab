name: Android Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "android/**"
      - "assets/**"
      - "src/**"
      - "App.tsx"
      - "index.ts"
      - "app.json"
      - "eas.json"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/android-release-apk.yml"

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID: ${{ secrets.EXPO_PUBLIC_ADMOB_BANNER_UNIT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Verify app before build
        run: npm run verify

      - name: Check Expo dependency compatibility
        run: npx expo install --check

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Build release APK
        env:
          NODE_ENV: production
        run: cd android && chmod +x gradlew && ./gradlew assembleRelease --no-daemon --max-workers=2

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stemm-lab-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
