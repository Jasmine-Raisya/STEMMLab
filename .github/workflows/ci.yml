name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: Secret Scan, TypeScript, and Jest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Scan for committed secrets
        run: npm run secrets:scan

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run Jest tests
        run: npm run ci
