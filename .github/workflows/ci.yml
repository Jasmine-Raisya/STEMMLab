name: CI

on:
  push:
    branches: [main, backend]
  pull_request:
    branches: [main, backend]

jobs:
  verify:
    name: Typecheck and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run Jest
        run: npm test -- --runInBand
